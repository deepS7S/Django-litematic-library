<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Библиотека схем Lightmatica</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #1e1e2f;
            color: #e0e0e0;
            line-height: 1.6;
        }

        header {
            background: #2a2a3b;
            padding: 1rem 2rem;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.3);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
        }

        header h1 a {
            color: #ffaa44;
            text-decoration: none;
        }

        .header-buttons {
            display: flex;
            gap: 1rem;
        }

        .btn {
            display: inline-block;
            background: #4c6ef5;
            color: white;
            padding: 0.5rem 1rem;
            text-decoration: none;
            border-radius: 6px;
            transition: background 0.3s;
            border: none;
            cursor: pointer;
            font-size: 1rem;
        }

        .btn:hover {
            background: #3b5bdb;
        }

        .btn-outline {
            background: transparent;
            border: 1px solid #4c6ef5;
            color: #4c6ef5;
        }

        .btn-outline:hover {
            background: #4c6ef5;
            color: white;
        }

        .btn-danger {
            background: #dc3545;
        }

        .btn-danger:hover {
            background: #c82333;
        }

        .btn-warning {
            background: #ffaa44;
            color: #1e1e2f;
        }

        .btn-warning:hover {
            background: #ff9933;
        }

        .container {
            max-width: 1400px;
            margin: 2rem auto;
            padding: 0 1rem;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(400px, 1fr));
            gap: 1.5rem;
            margin-top: 2rem;
        }

        .card {
            background: #2a2a3b;
            border-radius: 12px;
            overflow: hidden;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.2);
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 15px rgba(0, 0, 0, 0.3);
        }

        .card-img {
            width: 100%;
            height: 300px;
            object-fit: cover;
            background: #1a1a2a;
        }

        .card-content {
            padding: 1rem;
        }

        .card-title {
            font-size: 1.2rem;
            font-weight: bold;
            margin-bottom: 0.5rem;
            color: #ffaa44;
        }

        .card-author {
            color: #aaa;
            font-size: 0.9rem;
            margin-bottom: 0.5rem;
        }

        .card-description {
            font-size: 0.9rem;
            color: #ccc;
            margin-bottom: 1rem;
            overflow: hidden;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
        }

        .card-actions {
            width: 100%;
            display: flex;
            gap: 0.5rem;
            margin-top: 0.5rem;

        }

        .btn-sm {
            padding: 0.4rem;
            font-size: 0.8rem;
        }

        .form-group {
            margin-bottom: 1rem;
        }

        label {
            display: block;
            margin-bottom: 0.3rem;
            font-weight: bold;
        }

        input,
        select,
        textarea {
            width: 100%;
            padding: 0.5rem;
            border-radius: 6px;
            border: 1px solid #444;
            background: #1e1e2f;
            color: #e0e0e0;
        }

        .errorlist {
            color: #ff6b6b;
            list-style: none;
            margin-top: 0.2rem;
        }

        footer {
            text-align: center;
            padding: 2rem;
            background: #2a2a3b;
            margin-top: 2rem;
        }

        .pagination {
            display: flex;
            justify-content: center;
            gap: 0.5rem;
            margin-top: 2rem;
        }

        .pagination a,
        .pagination span {
            padding: 0.5rem 1rem;
            background: #2a2a3b;
            border-radius: 6px;
            text-decoration: none;
            color: #e0e0e0;
        }

        .pagination .current {
            background: #4c6ef5;
        }

        .stats {
            background: #2a2a3b;
            padding: 1rem;
            border-radius: 8px;
            margin-bottom: 1rem;
        }

        @media (max-width: 768px) {
            .grid {
                grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            }

            header {
                flex-direction: column;
                text-align: center;
            }
        }
    </style>

    <style>
        .page-footer {
            padding: 1rem;
            background: #333;
            color: #fff;
            text-align: center;
        }

        .page-footer.fixed-bottom {
            position: relative;
            left: 0;
            right: 0;
            bottom: 0;
        }
    </style>


</head>

<body>
    <header>
        <h1><a href="{% url 'schematic_list' %}">📐 Библиотека схем Lightmatica</a></h1>
        <div class="header-buttons">
            <a href="{% url 'author_list' %}" class="btn btn-outline"> Управление авторами</a>
            <a href="{% url 'schematic_add' %}" class="btn"> Добавить схему</a>
        </div>
    </header>
    <div class="container">
        {% block content %}{% endblock %}
    </div>
    <footer class="page-footer fixed-bottom">
        <p>Библиотека схем для Minecraft | Lightmatica</p>
    </footer>
</body>

</html>
