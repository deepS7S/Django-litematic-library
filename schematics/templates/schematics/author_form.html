{% extends 'schematics/base.html' %}

{% block content %}
<h2>{{ title }}</h2>
<form method="post">
    {% csrf_token %}
    {% for field in form %}
    <div class="form-group">
        {{ field.label_tag }}
        {{ field }}
        {% if field.errors %}
        <ul class="errorlist">
            {% for error in field.errors %}
            <li>{{ error }}</li>
            {% endfor %}
        </ul>
        {% endif %}
    </div>
    {% endfor %}
    <button type="submit" class="btn">Сохранить</button>
    <a href="{% url 'author_list' %}" class="btn" style="background:#6c757d;">Отмена</a>
</form>
{% endblock %}
